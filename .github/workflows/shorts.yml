name: Publish YouTube Short

# Runs twice daily to generate + upload one Short per run.
# Cron is in UTC. Times target ~13:22 / ~19:22 Europe/Istanbul (UTC+3).
# 2/day is optimal: avoids self-competition while maintaining consistency.
# Off-the-hour minutes avoid the on-the-hour publishing rush most big
# channels use, reducing competition in the first minutes after upload.
on:
  schedule:
    - cron: "22 10 * * *"  # 13:22 Istanbul
    - cron: "22 16 * * *"  # 19:22 Istanbul
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional: force a specific topic"
        required: false
        default: ""

concurrency:
  group: publish-short
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist self-optimizing state (topic/category history, performance
      # data) across scheduled runs via a rolling cache.
      - name: Restore optimizer state
        uses: actions/cache/restore@v4
        with:
          path: |
            output/performance.json
            output/history.json
            output/category_history.json
          key: optimizer-state-${{ github.run_id }}
          restore-keys: optimizer-state-

      - name: Write YouTube client secret
        env:
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: printf '%s' "$YOUTUBE_CLIENT_SECRET" > client_secret.json

      - name: Generate and upload Short
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          IMAGE_PROVIDER: ${{ vars.IMAGE_PROVIDER || 'gemini' }}
          TTS_PROVIDER: ${{ vars.TTS_PROVIDER || 'edge' }}
          EDGE_TTS_VOICE: ${{ vars.EDGE_TTS_VOICE || 'random' }}
          USE_STOCK_VIDEO: "true"
          YOUTUBE_PRIVACY_STATUS: ${{ vars.YOUTUBE_PRIVACY_STATUS || 'public' }}
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            python -m ai_shorts_factory run --topic "${{ github.event.inputs.topic }}"
          else
            python -m ai_shorts_factory run
          fi

      # Refresh public stats + winning-pattern weights (skips gracefully
      # when YOUTUBE_API_KEY is not configured).
      - name: Self-improvement loop
        if: always()
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: python -m ai_shorts_factory optimize || true

      - name: Save optimizer state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            output/performance.json
            output/history.json
            output/category_history.json
          key: optimizer-state-${{ github.run_id }}

      - name: Upload artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: short-output
          path: output/**/final.mp4
          if-no-files-found: ignore
          retention-days: 7
