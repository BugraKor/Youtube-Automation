name: Publish YouTube Short

# Publishes one Short per slot, twice daily (morning + evening).
# Cron is in UTC. Primary times target ~13:22 / ~19:22 Europe/Istanbul (UTC+3).
# 2/day is optimal: avoids self-competition while maintaining consistency.
# Off-the-hour minutes avoid the on-the-hour publishing rush most big
# channels use, reducing competition in the first minutes after upload.
#
# GitHub frequently delays and sometimes silently drops scheduled events, so
# each slot has several hourly backup triggers. A dedup guard (should-publish)
# ensures at most one Short goes out per slot per day: the first trigger that
# runs publishes, and later backups for the same slot no-op. All morning crons
# stay before 14:00 UTC and all evening crons after it (the slot boundary).
on:
  schedule:
    - cron: "22 10 * * *"  # morning slot  (13:22 Istanbul)
    - cron: "22 11 * * *"  # morning backup
    - cron: "22 12 * * *"  # morning backup
    - cron: "22 13 * * *"  # morning backup
    - cron: "22 16 * * *"  # evening slot  (19:22 Istanbul)
    - cron: "22 17 * * *"  # evening backup
    - cron: "22 18 * * *"  # evening backup
    - cron: "22 19 * * *"  # evening backup
  workflow_dispatch:
    inputs:
      topic:
        description: "Optional: force a specific topic"
        required: false
        default: ""

concurrency:
  group: publish-short
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Persist self-optimizing state (topic/category history, performance
      # data) across scheduled runs via a rolling cache.
      - name: Restore optimizer state
        uses: actions/cache/restore@v6
        with:
          path: |
            output/performance.json
            output/history.json
            output/category_history.json
          key: optimizer-state-${{ github.run_id }}
          restore-keys: optimizer-state-

      - name: Write YouTube client secret
        env:
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        run: printf '%s' "$YOUTUBE_CLIENT_SECRET" > client_secret.json

      # Dedup guard: publish at most one Short per slot per day. Forced runs
      # (workflow_dispatch) always publish; scheduled backups skip when a Short
      # already went out in the current slot.
      - name: Decide whether to publish
        id: guard
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "publish=true" >> "$GITHUB_OUTPUT"
          else
            decision=$(python -m ai_shorts_factory should-publish)
            echo "publish=$decision" >> "$GITHUB_OUTPUT"
          fi
          echo "publish=${decision:-true} (event=${{ github.event_name }})"

      - name: Generate and upload Short
        if: steps.guard.outputs.publish == 'true'
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          IMAGE_PROVIDER: ${{ vars.IMAGE_PROVIDER || 'gemini' }}
          TTS_PROVIDER: ${{ vars.TTS_PROVIDER || 'edge' }}
          EDGE_TTS_VOICE: ${{ vars.EDGE_TTS_VOICE || 'random' }}
          USE_STOCK_VIDEO: "true"
          CONTENT_THEME: ${{ vars.CONTENT_THEME || 'cosmic-dread' }}
          NICHE_LOCK: ${{ vars.NICHE_LOCK || 'true' }}
          YOUTUBE_PRIVACY_STATUS: ${{ vars.YOUTUBE_PRIVACY_STATUS || 'public' }}
        run: |
          if [ -n "${{ github.event.inputs.topic }}" ]; then
            python -m ai_shorts_factory run --topic "${{ github.event.inputs.topic }}"
          else
            python -m ai_shorts_factory run
          fi

      # Refresh Analytics metrics (retention, watch time, subs — needs the
      # refresh token with yt-analytics.readonly scope) + winning-pattern
      # weights; falls back to public stats via YOUTUBE_API_KEY.
      - name: Self-improvement loop
        if: always()
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python -m ai_shorts_factory optimize || true

      - name: Save optimizer state
        if: always()
        uses: actions/cache/save@v6
        with:
          path: |
            output/performance.json
            output/history.json
            output/category_history.json
          key: optimizer-state-${{ github.run_id }}

      - name: Upload artifacts (debug)
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: short-output
          path: output/**/final.mp4
          if-no-files-found: ignore
          retention-days: 7
